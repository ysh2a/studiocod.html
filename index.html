<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>visualstudio Download</title>
<style>

    body {
        width: 10px;
        height: 1000px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 80px;
        box-sizing: border-box;
        background: linear-gradient(135deg, #ffffff, #0000ff);
        color: white;
    }

    .text h1 {
        font-size: 70px;
        margin-bottom: 20px;
        line-height: 0.5;
        color: rgb(6, 68, 240);
    }

    .text h2 {
        font-size: 20px;
        margin-bottom: 30px;
        line-height: 1.3;
        color: rgb(6, 68, 240);
    }

    .text p {
        font-size: 25px;
        opacity: 1;
        margin-bottom: 20px;
        color: rgb(6, 68, 240);
    }

    .btn {
        padding: 14px 28px;
        background: #0078D4;
        color: white;
        text-decoration: none;
        border-radius: 6px;
        font-weight: bold;
        transition: 0.3s;
    }

    .btn:hover {
        background: #2899f5;
        box-shadow: 0 0 15px rgba(40,153,245,0.7);
    }

    .code-box {
        width: 420px;
        height: 280px;
        background: #1e1e1e;
        border-radius: 10px;
        padding: 20px;
        box-shadow: 0 0 25px rgba(0,0,0,0.5);
        font-family: monospace;
        position: relative;
    }

    .code-box::before {
        content: "";
        position: absolute;
        top: 10px;
        left: 15px;
        width: 10px;
        height: 10px;
        background: #ff5f56;
        border-radius: 50%;
        box-shadow: 18px 0 #ffbd2e, 36px 0 #27c93f;
    }

    .code {
        margin-top: 30px;
        color: #dcdcdc;
        font-size: 14px;
        line-height: 1.6;
    }

    .keyword { color: #569cd6; }
    .func { color: #dcdcaa; }
    .string { color: #ce9178; }

    @media (max-width: 900px) {
        .banner {
            flex-direction: column;
            text-align: center;
            height: auto;
            padding: 60px 20px;
        }

        .text {
            max-width: 100%;
        }

        .code-box {
            margin-top: 40px;
            width: 90%;
        }
    }

    
</style>
<h5></h5>
</head>
<body>

<div class="studio">
    <div class="text">
        <h1>비주얼 스튜디오</h1>
        <p>자바스크립트</p>
        <a href="https://code.visualstudio.com/" class="btn">무료 다운로드</a>
        <h2>오픈 소스 AI 코드 편집기다수의 에이전트 개발을 위한 최적의 플랫폼</h2>
    </div>

    <div>

    </div>

    <div class="code-box">
        <div class="code">
            <span class="keyword">function</span> <span class="func">startApp</span>() { <br>
            &nbsp;&nbsp;<span class="keyword">const</span> msg = <span class="string">"Hello Developer"</span>; <br>
            &nbsp;&nbsp;console.log(msg); <br>
            }
            <span class="func">startApp</span>();
        </div>
    </div>
</div>
</body>
</html>
