<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>visualstudio Download</title>

<style>
body {
    margin: 0;
    height: 100vh;
    background: linear-gradient(135deg, #c6d1ff, #26128a);
    display: flex;
    justify-content: center;   /* 좌우 위치 */
    align-items: center;       /* 상하 위치 */
}

/* 전체 레이아웃 */
.studio {
    display: flex;
    gap: 80px;
    align-items: center;
}

/* 텍스트 영역 */
.text h1 {
    font-size: 60px;
    margin-bottom: 20px;
    color: rgb(6, 68, 240);
}

.text h2 {
    font-size: 20px;
    margin-top: 20px;
    color: rgb(6, 68, 240);
}

.text p {
    font-size: 25px;
    margin-bottom: 20px;
    color: rgb(6, 68, 240);
}

/* 버튼 */
.btn {
    padding: 14px 28px;
    background: #0078D4;
    color: white;
    text-decoration: none;
    border-radius: 6px;
    font-weight: bold;
    transition: 0.3s;
}

.btn:hover {
    background: #2899f5;
    box-shadow: 0 0 15px rgba(40,153,245,0.7);
}

/* 코드 박스 */
.code-box {
    width: 420px;
    height: 280px;
    background: #1e1e1e;
    border-radius: 10px;
    padding: 20px;
    box-shadow: 0 0 25px rgba(0,0,0,0.5);
    font-family: monospace;
    position: relative;
}

.code-box::before {
    content: "";
    position: absolute;
    top: 10px;
    left: 15px;
    width: 10px;
    height: 10px;
    background: #ff5f56;
    border-radius: 50%;
    box-shadow: 18px 0 #ffbd2e, 36px 0 #27c93f;
}

.code {
    margin-top: 30px;
    color: #dcdcdc;
    font-size: 14px;
    line-height: 1.6;
}

.keyword { color: #569cd6; }
.func { color: #dcdcaa; }
.string { color: #ce9178; }

@media (max-width: 900px) {
    .studio {
        flex-direction: column;
        text-align: center;
    }
}
</style>
</head>

<body>

<div class="studio">
    <div class="text">
        <h1>비주얼 스튜디오</h1>
        <p>자바스크립트</p>
        <h2>오픈 소스 AI 코드 편집기<br>다수의 에이전트 개발을 위한 최적의 플랫폼</h2>
        <a href="https://code.visualstudio.com/" class="btn">무료 다운로드</a>
    </div>

    <div class="code-box">
        <div class="code">
            <span class="keyword">function</span> <span class="func">startApp</span>() { <br>
            &nbsp;&nbsp;<span class="keyword">const</span> msg = <span class="string">"Hello Developer"</span>; <br>
            &nbsp;&nbsp;console.log(msg); <br>
            }
            <span class="func">startApp</span>();
        </div>
    </div>
</div>

</body>
</html>
